<div class="task-card animate-in" [class.overdue]="isOverdue()">
  <div class="card-top">
    <div class="card-meta">
      <span class="badge" [class]="'badge-' + task.priority">{{ task.priority }}</span>
      <span class="category">{{ task.category }}</span>
    </div>
    <div class="card-actions">
      <button class="action-btn" (click)="edit.emit(task)" title="Edit"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="action-btn danger" (click)="delete.emit(task.id)" title="Delete"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
    </div>
  </div>
  <h4 class="card-title">{{ task.title }}</h4>
  <p class="card-desc">{{ task.description }}</p>
  <div class="card-tags" *ngIf="task.tags?.length">
    <span class="tag" *ngFor="let tag of task.tags">{{ tag }}</span>
  </div>
  <div class="card-footer">
    <div class="due-date" [class.overdue]="isOverdue()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      {{ getDaysLeft() }}
    </div>
    <button class="status-cycle" (click)="nextStatus()" title="Move to next status">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>
