<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" stroke="#fff" stroke-width="2" stroke-linecap="round"/><rect x="9" y="3" width="6" height="4" rx="1" stroke="#fff" stroke-width="2"/><path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span>TaskFlow</span>
    <span class="py-badge">Python</span>
  </div>
  <nav>
    <div class="nav-label">Main</div>
    <button class="nav-item" [class.active]="activeView==='board'" (click)="navigate('board')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Board
    </button>
    <button class="nav-item" [class.active]="activeView==='analytics'" (click)="navigate('analytics')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Analytics
    </button>
    <div class="nav-label" style="margin-top:16px">Filters</div>
    <button class="nav-item filter" [class.active]="activeView==='todo'" (click)="navigate('todo')"><span class="dot todo"></span> Todo</button>
    <button class="nav-item filter" [class.active]="activeView==='in-progress'" (click)="navigate('in-progress')"><span class="dot in-progress"></span> In Progress</button>
    <button class="nav-item filter" [class.active]="activeView==='done'" (click)="navigate('done')"><span class="dot done"></span> Completed</button>
  </nav>
  <div class="sidebar-footer">
    <div class="stack-pills">
      <span>FastAPI</span><span>SQLAlchemy</span><span>SQLite</span>
    </div>
    <div class="user-info" *ngIf="user">
      <div class="avatar">{{ user.avatar }}</div>
      <div class="user-details"><div class="user-name">{{ user.name }}</div><div class="user-role">{{ user.role }}</div></div>
    </div>
    <button class="logout-btn" (click)="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign out
    </button>
  </div>
</aside>
