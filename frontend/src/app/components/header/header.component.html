<header class="header">
  <div class="header-left"><h2>{{ title }}</h2></div>
  <div class="header-right">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search tasks..." [(ngModel)]="search" (input)="searchChange.emit(search)"/>
    </div>
    <button class="btn btn-primary" (click)="addTask.emit()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Task
    </button>
  </div>
</header>
